<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1f12;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Number grid 3x3 -->
  <g>
    <!-- Row 1 -->
    <rect x="80" y="60" width="60" height="60" rx="12" fill="#0d2016" stroke="#00ff88" stroke-width="2"/>
    <text x="110" y="93" text-anchor="middle" dominant-baseline="middle" fill="#00ff88" font-size="26" font-weight="900" font-family="sans-serif">1</text>
    <rect x="170" y="60" width="60" height="60" rx="12" fill="#0d2016" stroke="#00ff88" stroke-width="2"/>
    <text x="200" y="93" text-anchor="middle" dominant-baseline="middle" fill="#00ff88" font-size="26" font-weight="900" font-family="sans-serif">2</text>
    <rect x="260" y="60" width="60" height="60" rx="12" fill="#0d2016" stroke="#00ff88" stroke-width="2"/>
    <text x="290" y="93" text-anchor="middle" dominant-baseline="middle" fill="#00ff88" font-size="26" font-weight="900" font-family="sans-serif">3</text>
    <!-- Row 2 -->
    <rect x="80" y="135" width="60" height="60" rx="12" fill="#00ff8820" stroke="#00ff88" stroke-width="2.5"/>
    <text x="110" y="168" text-anchor="middle" dominant-baseline="middle" fill="#00ff88" font-size="26" font-weight="900" font-family="sans-serif">4</text>
    <rect x="170" y="135" width="60" height="60" rx="12" fill="#0d2016" stroke="#00ff8860" stroke-width="1.5"/>
    <text x="200" y="168" text-anchor="middle" dominant-baseline="middle" fill="#6b7280" font-size="26" font-weight="900" font-family="sans-serif">5</text>
    <rect x="260" y="135" width="60" height="60" rx="12" fill="#00ff8820" stroke="#00ff88" stroke-width="2.5"/>
    <text x="290" y="168" text-anchor="middle" dominant-baseline="middle" fill="#00ff88" font-size="26" font-weight="900" font-family="sans-serif">6</text>
    <!-- Jackpot badge -->
    <rect x="50" y="210" width="300" height="40" rx="10" fill="#00ff8815" stroke="#00ff88" stroke-width="1.5"/>
    <text x="200" y="233" text-anchor="middle" dominant-baseline="middle" fill="#00ff88" font-size="16" font-weight="900" font-family="sans-serif">3 Matches → 20× JACKPOT</text>
  </g>
  <text x="200" y="275" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="900" font-family="sans-serif">NUMBER MATCH</text>
</svg>
