<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1f1a"/>
      <stop offset="100%" stop-color="#050e0b"/>
    </radialGradient>
    <radialGradient id="explosion" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ff2200" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gem1" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#80ffcc"/>
      <stop offset="100%" stop-color="#00cc66"/>
    </radialGradient>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Subtle grid texture -->
  <rect width="400" height="300" fill="none" stroke="#00ff8820" stroke-width="0.5"
    style="background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, #00ff8808 40px)"/>

  <!-- Title glow backdrop -->
  <ellipse cx="200" cy="45" rx="160" ry="30" fill="#00ff8812"/>

  <!-- === TILE GRID (5x4 visible) === -->
  <!-- Row 1 -->
  <!-- Tile 1,1 - gem -->
  <rect x="30" y="80" width="60" height="55" rx="8" fill="#0a2018" stroke="#00ff6640" stroke-width="1.5" filter="url(#shadow)"/>
  <polygon points="60,92 68,104 60,118 52,104" fill="url(#gem1)" filter="url(#glow-green)"/>
  <line x1="60" y1="92" x2="60" y2="118" stroke="#80ffcc60" stroke-width="1"/>
  <line x1="52" y1="104" x2="68" y2="104" stroke="#80ffcc60" stroke-width="1"/>

  <!-- Tile 1,2 - hidden -->
  <rect x="100" y="80" width="60" height="55" rx="8" fill="#0a1a14" stroke="#ffffff10" stroke-width="1.5"/>
  <rect x="112" y="92" width="36" height="31" rx="4" fill="#ffffff06"/>

  <!-- Tile 1,3 - BOMB (exploding center) -->
  <rect x="170" y="80" width="60" height="55" rx="8" fill="#1a0808" stroke="#ff440060" stroke-width="2"/>
  <!-- Explosion glow -->
  <circle cx="200" cy="107" r="30" fill="url(#explosion)" filter="url(#glow-red)"/>
  <!-- Bomb body -->
  <circle cx="200" cy="110" r="14" fill="#1a1a1a" stroke="#ff4400" stroke-width="2" filter="url(#glow-red)"/>
  <!-- Bomb fuse -->
  <path d="M200 96 Q206 90 210 86" stroke="#ffaa00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="211" cy="85" r="3" fill="#ffdd00" filter="url(#glow-red)"/>
  <!-- Bomb skull dots -->
  <circle cx="194" cy="108" r="2.5" fill="#ff4400"/>
  <circle cx="206" cy="108" r="2.5" fill="#ff4400"/>
  <path d="M194 116 Q200 120 206 116" stroke="#ff4400" stroke-width="1.5" fill="none"/>
  <!-- Explosion sparks -->
  <line x1="200" y1="80" x2="200" y2="74" stroke="#ff6600" stroke-width="2" stroke-linecap="round" filter="url(#glow-red)"/>
  <line x1="216" y1="86" x2="220" y2="81" stroke="#ff6600" stroke-width="2" stroke-linecap="round" filter="url(#glow-red)"/>
  <line x1="184" y1="86" x2="180" y2="81" stroke="#ff6600" stroke-width="2" stroke-linecap="round" filter="url(#glow-red)"/>
  <line x1="222" y1="100" x2="228" y2="98" stroke="#ffaa00" stroke-width="1.5" stroke-linecap="round" filter="url(#glow-red)"/>
  <line x1="178" y1="100" x2="172" y2="98" stroke="#ffaa00" stroke-width="1.5" stroke-linecap="round" filter="url(#glow-red)"/>

  <!-- Tile 1,4 - gem -->
  <rect x="240" y="80" width="60" height="55" rx="8" fill="#0a2018" stroke="#00ff6640" stroke-width="1.5" filter="url(#shadow)"/>
  <polygon points="270,92 278,104 270,118 262,104" fill="url(#gem1)" filter="url(#glow-green)"/>
  <line x1="270" y1="92" x2="270" y2="118" stroke="#80ffcc60" stroke-width="1"/>
  <line x1="262" y1="104" x2="278" y2="104" stroke="#80ffcc60" stroke-width="1"/>

  <!-- Tile 1,5 - hidden -->
  <rect x="310" y="80" width="60" height="55" rx="8" fill="#0a1a14" stroke="#ffffff10" stroke-width="1.5"/>
  <rect x="322" y="92" width="36" height="31" rx="4" fill="#ffffff06"/>

  <!-- Row 2 -->
  <!-- Tile 2,1 - hidden -->
  <rect x="30" y="148" width="60" height="55" rx="8" fill="#0a1a14" stroke="#ffffff10" stroke-width="1.5"/>
  <rect x="42" y="160" width="36" height="31" rx="4" fill="#ffffff06"/>

  <!-- Tile 2,2 - gem -->
  <rect x="100" y="148" width="60" height="55" rx="8" fill="#0a2018" stroke="#00ff6640" stroke-width="1.5" filter="url(#shadow)"/>
  <polygon points="130,160 138,172 130,186 122,172" fill="url(#gem1)" filter="url(#glow-green)"/>
  <line x1="130" y1="160" x2="130" y2="186" stroke="#80ffcc60" stroke-width="1"/>
  <line x1="122" y1="172" x2="138" y2="172" stroke="#80ffcc60" stroke-width="1"/>

  <!-- Tile 2,3 - hidden -->
  <rect x="170" y="148" width="60" height="55" rx="8" fill="#0a1a14" stroke="#ffffff10" stroke-width="1.5"/>
  <rect x="182" y="160" width="36" height="31" rx="4" fill="#ffffff06"/>

  <!-- Tile 2,4 - hidden -->
  <rect x="240" y="148" width="60" height="55" rx="8" fill="#0a1a14" stroke="#ffffff10" stroke-width="1.5"/>
  <rect x="252" y="160" width="36" height="31" rx="4" fill="#ffffff06"/>

  <!-- Tile 2,5 - gem -->
  <rect x="310" y="148" width="60" height="55" rx="8" fill="#0a2018" stroke="#00ff6640" stroke-width="1.5" filter="url(#shadow)"/>
  <polygon points="340,160 348,172 340,186 332,172" fill="url(#gem1)" filter="url(#glow-green)"/>
  <line x1="340" y1="160" x2="340" y2="186" stroke="#80ffcc60" stroke-width="1"/>
  <line x1="332" y1="172" x2="348" y2="172" stroke="#80ffcc60" stroke-width="1"/>

  <!-- Multiplier badge -->
  <rect x="148" y="218" width="104" height="36" rx="10" fill="#00ff8820" stroke="#00ff8855" stroke-width="1.5"/>
  <text x="200" y="241" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#00ff88" filter="url(#glow-green)">14.5x</text>

  <!-- Title -->
  <text x="200" y="48" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" letter-spacing="4" fill="#00ff88" filter="url(#glow-green)">MINES</text>
  <text x="200" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#00ff8890" letter-spacing="2">AVOID THE BOMB • CASH OUT</text>

  <!-- Corner sparkles -->
  <circle cx="22" cy="22" r="2" fill="#00ff88" opacity="0.6"/>
  <circle cx="378" cy="22" r="2" fill="#00ff88" opacity="0.6"/>
  <circle cx="22" cy="278" r="2" fill="#00ff88" opacity="0.4"/>
  <circle cx="378" cy="278" r="2" fill="#00ff88" opacity="0.4"/>
</svg>
