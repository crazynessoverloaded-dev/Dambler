<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060212"/>
      <stop offset="100%" stop-color="#0d0520"/>
    </linearGradient>
    <radialGradient id="purpleGlow" cx="50%" cy="48%" r="52%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cabinetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#160840"/>
      <stop offset="100%" stop-color="#0a0325"/>
    </linearGradient>
    <linearGradient id="marqueeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="40%" stop-color="#7c3aed"/>
      <stop offset="60%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="paylineGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="20%" stop-color="#fbbf24"/>
      <stop offset="80%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="jokerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="jokerBloom">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cabSh">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>
  <rect width="400" height="300" fill="url(#purpleGlow)"/>

  <!-- Cabinet body -->
  <g filter="url(#cabSh)">
    <rect x="42" y="18" width="316" height="238" rx="20" fill="url(#cabinetGrad)"/>
    <rect x="42" y="18" width="316" height="238" rx="20" fill="none" stroke="#7c3aed" stroke-width="2"/>
  </g>

  <!-- Top marquee -->
  <rect x="42" y="18" width="316" height="38" rx="20" fill="url(#marqueeGrad)"/>
  <rect x="42" y="38" width="316" height="18" fill="url(#marqueeGrad)"/>
  <text x="200" y="43" text-anchor="middle" fill="#fef9c3" font-size="14" font-weight="900" font-family="sans-serif" letter-spacing="3">✦ SLOT JOKER ✦</text>

  <!-- Inner cabinet detail lines -->
  <rect x="54" y="60" width="292" height="152" rx="10" fill="#0a0220" opacity="0.6"/>
  <rect x="54" y="60" width="292" height="152" rx="10" fill="none" stroke="#4c1d95" stroke-width="1" opacity="0.6"/>

  <!-- Reel windows — 3×, each 82×122, y=66 -->
  <!-- Window 1 x=62 -->
  <rect x="62" y="66" width="82" height="122" rx="9" fill="#030010" stroke="#6d28d9" stroke-width="1.5"/>
  <!-- Window 2 x=159 (center, joker) -->
  <rect x="159" y="62" width="82" height="130" rx="9" fill="#0a0220"/>
  <!-- Joker glow halo -->
  <ellipse cx="200" cy="127" rx="50" ry="50" fill="url(#jokerGlow)"/>
  <rect x="159" y="62" width="82" height="130" rx="9" fill="none" stroke="#a855f7" stroke-width="2.5" filter="url(#jokerBloom)"/>
  <!-- Window 3 x=256 -->
  <rect x="256" y="66" width="82" height="122" rx="9" fill="#030010" stroke="#6d28d9" stroke-width="1.5"/>

  <!-- Top fade on each window -->
  <rect x="62"  y="66"  width="82" height="22" rx="9" fill="url(#bg)" opacity="0.7"/>
  <rect x="159" y="62"  width="82" height="22" rx="9" fill="url(#bg)" opacity="0.7"/>
  <rect x="256" y="66"  width="82" height="22" rx="9" fill="url(#bg)" opacity="0.7"/>
  <!-- Bottom fade on each window -->
  <rect x="62"  y="166" width="82" height="22" rx="9" fill="url(#bg)" opacity="0.7"/>
  <rect x="159" y="170" width="82" height="22" rx="9" fill="url(#bg)" opacity="0.7"/>
  <rect x="256" y="166" width="82" height="22" rx="9" fill="url(#bg)" opacity="0.7"/>

  <!-- WINDOW 1 symbols (top/center/bottom) — payline at y=127 -->
  <text x="103" y="98"  text-anchor="middle" font-size="22" font-family="sans-serif" opacity="0.65">💎</text>
  <text x="103" y="132" text-anchor="middle" font-size="30" font-family="sans-serif">💎</text>
  <text x="103" y="166" text-anchor="middle" font-size="22" font-family="sans-serif" opacity="0.65">🍒</text>

  <!-- WINDOW 2 symbols (joker center) -->
  <text x="200" y="96"  text-anchor="middle" font-size="20" font-family="sans-serif" opacity="0.5">⭐</text>
  <text x="200" y="136" text-anchor="middle" font-size="38" font-family="sans-serif">🃏</text>
  <text x="200" y="172" text-anchor="middle" font-size="20" font-family="sans-serif" opacity="0.5">🔔</text>

  <!-- WINDOW 3 symbols -->
  <text x="297" y="98"  text-anchor="middle" font-size="22" font-family="sans-serif" opacity="0.65">7️⃣</text>
  <text x="297" y="132" text-anchor="middle" font-size="30" font-family="sans-serif">💎</text>
  <text x="297" y="166" text-anchor="middle" font-size="22" font-family="sans-serif" opacity="0.65">🍇</text>

  <!-- Gold payline -->
  <rect x="54" y="122" width="292" height="2" fill="url(#paylineGold)" opacity="0.7"/>
  <!-- Payline arrows -->
  <polygon points="54,118 54,130 46,124" fill="#fbbf24" opacity="0.8"/>
  <polygon points="346,118 346,130 354,124" fill="#fbbf24" opacity="0.8"/>

  <!-- WILD label on center reel -->
  <rect x="166" y="148" width="68" height="18" rx="5" fill="#7c3aed" opacity="0.9"/>
  <text x="200" y="161" text-anchor="middle" fill="#fef9c3" font-size="10" font-weight="900" font-family="sans-serif" letter-spacing="2">W I L D</text>

  <!-- Bottom panel -->
  <rect x="54" y="224" width="292" height="26" rx="8" fill="#1a0840" opacity="0.8"/>
  <rect x="54" y="224" width="292" height="26" rx="8" fill="none" stroke="#6d28d9" stroke-width="1"/>
  <text x="200" y="241" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700" font-family="sans-serif">🃏 JOKER WILD · TRIPLE DIAMONDS = 50×</text>

  <text x="200" y="282" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="900" font-family="sans-serif" letter-spacing="3">SLOT JOKER</text>
</svg>
