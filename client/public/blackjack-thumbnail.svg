<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs>
  <radialGradient id="bj-bg" cx="50%" cy="40%" r="70%">
    <stop offset="0%" stop-color="#0d2a18"/><stop offset="100%" stop-color="#040a06"/>
  </radialGradient>
  <radialGradient id="bj-glow" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#00ff88" stop-opacity="0.18"/><stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="bj-card" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#f8f9fa"/><stop offset="100%" stop-color="#e9ecef"/>
  </linearGradient>
  <linearGradient id="bj-back" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1e3a8a"/><stop offset="100%" stop-color="#1e2d5e"/>
  </linearGradient>
  <filter id="bj-shadow"><feDropShadow dx="3" dy="5" stdDeviation="8" flood-color="#000" flood-opacity="0.8"/></filter>
  <filter id="bj-glow-f"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="bj-glow-s"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<!-- Background -->
<rect width="400" height="300" fill="url(#bj-bg)"/>
<ellipse cx="200" cy="155" rx="190" ry="130" fill="url(#bj-glow)"/>
<!-- Felt table edge -->
<ellipse cx="200" cy="310" rx="260" ry="160" fill="#0a2a14" opacity="0.6"/>
<!-- Dealer card (face down, angled left) -->
<g transform="rotate(-18,108,155)" filter="url(#bj-shadow)">
  <rect x="48" y="88" width="90" height="132" rx="10" fill="url(#bj-back)" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="56" y="96" width="74" height="116" rx="7" fill="none" stroke="#3b82f6" stroke-width="1"/>
  <text x="93" y="162" text-anchor="middle" font-family="serif" font-size="28" fill="#3b82f6" opacity="0.5">♦</text>
  <text x="93" y="148" text-anchor="middle" font-family="Arial Black" font-size="12" fill="#3b82f6" opacity="0.4">DEALER</text>
</g>
<!-- ACE of SPADES - player card 1 -->
<g transform="rotate(-6,178,152)" filter="url(#bj-shadow)">
  <rect x="130" y="78" width="96" height="138" rx="11" fill="url(#bj-card)" stroke="#d1d5db" stroke-width="1"/>
  <text x="144" y="104" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="#111">A</text>
  <text x="144" y="122" font-family="Arial,sans-serif" font-size="15" fill="#111">♠</text>
  <text x="178" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="62" fill="#111">♠</text>
  <text x="212" y="209" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="#111" transform="rotate(180,212,200)">A</text>
</g>
<!-- KING of HEARTS - player card 2 -->
<g transform="rotate(8,265,148)" filter="url(#bj-shadow)">
  <rect x="218" y="72" width="96" height="138" rx="11" fill="url(#bj-card)" stroke="#d1d5db" stroke-width="1"/>
  <text x="232" y="98" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="#dc2626">K</text>
  <text x="232" y="116" font-family="Arial,sans-serif" font-size="15" fill="#dc2626">♥</text>
  <text x="266" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="62" fill="#dc2626">♥</text>
  <text x="300" y="203" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="#dc2626" transform="rotate(180,300,195)">K</text>
</g>
<!-- Chips stack -->
<ellipse cx="340" cy="210" rx="22" ry="7" fill="#b45309" opacity="0.9"/>
<rect x="318" y="190" width="44" height="20" rx="4" fill="#d97706"/>
<ellipse cx="340" cy="190" rx="22" ry="7" fill="#fbbf24"/>
<ellipse cx="340" cy="183" rx="22" ry="7" fill="#d97706"/>
<ellipse cx="340" cy="176" rx="22" ry="7" fill="#fbbf24"/>
<text x="340" y="183" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="7" fill="#78350f" font-weight="900">25</text>
<!-- 21 WINS badge -->
<rect x="124" y="236" width="152" height="44" rx="14" fill="#001a0a" stroke="#00ff88" stroke-width="2.5" filter="url(#bj-glow-f)"/>
<text x="200" y="254" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="13" fill="#00ff88">BLACKJACK PAYS</text>
<text x="200" y="273" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="18" font-weight="900" fill="#00ff88" filter="url(#bj-glow-s)">3 : 2</text>
<!-- Title -->
<text x="200" y="38" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="28" font-weight="900" letter-spacing="5" fill="#00ff88" filter="url(#bj-glow-f)">BLACKJACK</text>
<text x="200" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#00ff8870" letter-spacing="3">BEAT THE DEALER TO 21</text>
</svg>