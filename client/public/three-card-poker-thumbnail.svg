<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs>
  <radialGradient id="tcp-bg" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#14120a"/><stop offset="100%" stop-color="#060500"/>
  </radialGradient>
  <radialGradient id="tcp-glow" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#d97706" stop-opacity="0.2"/><stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tcp-card" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#f0fdf4"/>
  </linearGradient>
  <linearGradient id="tcp-gold" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#b45309"/>
  </linearGradient>
  <filter id="tcp-shadow"><feDropShadow dx="4" dy="7" stdDeviation="10" flood-color="#000" flood-opacity="0.85"/></filter>
  <filter id="tcp-glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="tcp-big-glow"><feGaussianBlur stdDeviation="14" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="400" height="300" fill="url(#tcp-bg)"/>
<ellipse cx="200" cy="155" rx="190" ry="130" fill="url(#tcp-glow)"/>
<!-- Felt table -->
<ellipse cx="200" cy="320" rx="280" ry="170" fill="#0a1f0c" opacity="0.5"/>
<!-- Card LEFT - Q spades -->
<g transform="rotate(-22,120,150)" filter="url(#tcp-shadow)">
  <rect x="48" y="68" width="100" height="148" rx="12" fill="url(#tcp-card)" stroke="#d1fae5" stroke-width="1"/>
  <text x="62" y="98" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#111">Q</text>
  <text x="62" y="118" font-family="Arial,sans-serif" font-size="16" fill="#111">♠</text>
  <text x="98" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="68" fill="#111">♠</text>
  <text x="134" y="210" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#111" transform="rotate(180,134,201)">Q</text>
</g>
<!-- Card CENTER - K spades -->
<g filter="url(#tcp-shadow)">
  <rect x="152" y="55" width="100" height="148" rx="12" fill="url(#tcp-card)" stroke="#d1fae5" stroke-width="1.5"/>
  <text x="166" y="85" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#111">K</text>
  <text x="166" y="105" font-family="Arial,sans-serif" font-size="16" fill="#111">♠</text>
  <text x="202" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="68" fill="#111">♠</text>
  <text x="238" y="197" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#111" transform="rotate(180,238,188)">K</text>
</g>
<!-- Card RIGHT - A spades (GOLD border to show winning suit) -->
<g transform="rotate(22,280,150)" filter="url(#tcp-shadow)">
  <rect x="252" y="68" width="100" height="148" rx="12" fill="url(#tcp-card)" stroke="#fbbf24" stroke-width="2.5"/>
  <text x="266" y="98" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#111">A</text>
  <text x="266" y="118" font-family="Arial,sans-serif" font-size="16" fill="#111">♠</text>
  <text x="302" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="68" fill="#111">♠</text>
  <text x="338" y="210" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#111" transform="rotate(180,338,201)">A</text>
</g>
<!-- STRAIGHT FLUSH badge -->
<rect x="100" y="236" width="200" height="44" rx="14" fill="#0a0800" stroke="url(#tcp-gold)" stroke-width="2.5" filter="url(#tcp-glow)"/>
<text x="200" y="254" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="11" fill="#fbbf24" letter-spacing="2">STRAIGHT FLUSH</text>
<text x="200" y="273" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="18" font-weight="900" fill="#fbbf24" filter="url(#tcp-big-glow)">PAYS 40 : 1</text>
<!-- Title -->
<text x="200" y="34" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="20" font-weight="900" letter-spacing="4" fill="#fbbf24" filter="url(#tcp-glow)">THREE CARD POKER</text>
<!-- Suit symbols decoration -->
<text x="30" y="45" font-family="Arial,sans-serif" font-size="20" fill="#d97706" opacity="0.5">♠</text>
<text x="358" y="45" font-family="Arial,sans-serif" font-size="20" fill="#d97706" opacity="0.5">♠</text>
</svg>