<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#001a1a"/><stop offset="100%" stop-color="#000d0d"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%"><stop offset="0%" stop-color="#00bcd4" stop-opacity="0.2"/><stop offset="100%" stop-color="#00bcd4" stop-opacity="0"/></radialGradient>
    <linearGradient id="felt" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00695c"/><stop offset="100%" stop-color="#004d40"/></linearGradient>
    <filter id="tg"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="tgs"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="150" rx="190" ry="130" fill="url(#glow)"/>
  <!-- Table felt -->
  <ellipse cx="200" cy="200" rx="195" ry="110" fill="url(#felt)" fill-opacity="0.55"/>
  <ellipse cx="200" cy="200" rx="195" ry="110" fill="none" stroke="#00bcd4" stroke-width="2" stroke-opacity="0.4"/>
  <ellipse cx="200" cy="200" rx="170" ry="88" fill="none" stroke="#00bcd4" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Big 21 -->
  <text x="200" y="238" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="130" font-weight="900" fill="#00bcd4" fill-opacity="0.12" filter="url(#tgs)">21</text>
  <text x="200" y="238" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="130" font-weight="900" fill="#00bcd4" fill-opacity="0.82">21</text>
  <!-- Dice on top of 21 -->
  <rect x="60" y="88" width="70" height="70" rx="10" fill="#002020" stroke="#00bcd4" stroke-width="2.5" stroke-opacity="0.9"/>
  <circle cx="78" cy="106" r="7" fill="#00bcd4" filter="url(#tg)"/>
  <circle cx="112" cy="106" r="7" fill="#00bcd4" filter="url(#tg)"/>
  <circle cx="78" cy="140" r="7" fill="#00bcd4" filter="url(#tg)"/>
  <circle cx="112" cy="140" r="7" fill="#00bcd4" filter="url(#tg)"/>
  <rect x="150" y="78" width="60" height="60" rx="8" fill="#002020" stroke="#00bcd4" stroke-width="2" stroke-opacity="0.8"/>
  <circle cx="170" cy="98" r="6" fill="#00bcd4" filter="url(#tg)"/>
  <circle cx="190" cy="108" r="6" fill="#00bcd4" filter="url(#tg)"/>
  <circle cx="170" cy="128" r="6" fill="#00bcd4" filter="url(#tg)"/>
  <rect x="226" y="90" width="64" height="64" rx="9" fill="#002020" stroke="#00bcd4" stroke-width="2" stroke-opacity="0.75"/>
  <circle cx="244" cy="108" r="6.5" fill="#00bcd4" filter="url(#tg)"/>
  <circle cx="272" cy="108" r="6.5" fill="#00bcd4" filter="url(#tg)"/>
  <circle cx="244" cy="134" r="6.5" fill="#00bcd4" filter="url(#tg)"/>
  <circle cx="272" cy="134" r="6.5" fill="#00bcd4" filter="url(#tg)"/>
  <!-- HIT / STAND buttons -->
  <rect x="44" y="248" width="80" height="30" rx="8" fill="#00bcd4" fill-opacity="0.18" stroke="#00bcd4" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="84" y="268" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="12" font-weight="900" fill="#00bcd4">HIT</text>
  <rect x="276" y="248" width="80" height="30" rx="8" fill="#ef5350" fill-opacity="0.18" stroke="#ef5350" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="316" y="268" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="12" font-weight="900" fill="#ef5350">STAND</text>
  <text x="200" y="268" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="9" fill="#00bcd4" fill-opacity="0.5" letter-spacing="2">= 7+4+10</text>
  <text x="200" y="44" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="26" font-weight="900" letter-spacing="5" fill="#00bcd4" filter="url(#tg)">DICE 21</text>
  <text x="200" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#00bcd4" fill-opacity="0.55" letter-spacing="3">ROLL YOUR WAY TO BLACKJACK</text>
</svg>