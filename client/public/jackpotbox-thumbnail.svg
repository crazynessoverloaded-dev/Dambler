<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080400"/>
      <stop offset="100%" stop-color="#100800"/>
    </linearGradient>
    <radialGradient id="jackpotGlow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="jackpotInner" cx="30%" cy="20%" r="75%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="55%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <radialGradient id="chipGold" cx="35%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="45%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <filter id="jackpotBloom">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boxSh">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>
  <rect width="400" height="300" fill="url(#jackpotGlow)"/>

  <!-- ─── JACKPOT BOX — center top, open, glowing (x=152, y=28, 96×92) ─── -->
  <!-- Glow halo -->
  <ellipse cx="200" cy="74" rx="75" ry="60" fill="url(#jackpotGlow)" filter="url(#jackpotBloom)"/>
  <g filter="url(#jackpotBloom)">
    <!-- Box body (gold interior) -->
    <rect x="152" y="56" width="96" height="64" rx="7" fill="url(#jackpotInner)"/>
    <rect x="152" y="56" width="96" height="64" rx="7" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
    <!-- Vertical ribbon on body -->
    <rect x="192" y="56" width="16" height="64" fill="#fef08a" opacity="0.4"/>
    <!-- Horizontal ribbon on body -->
    <rect x="152" y="80" width="96" height="10" fill="#fef08a" opacity="0.4"/>
    <!-- 10× text inside -->
    <text x="200" y="82" text-anchor="middle" fill="#78350f" font-size="22" font-weight="900" font-family="Georgia,serif">10×</text>
    <text x="200" y="106" text-anchor="middle" fill="#92400e" font-size="9" font-weight="700" font-family="sans-serif" letter-spacing="2">JACKPOT</text>
  </g>
  <!-- Open lid (tilted) -->
  <g filter="url(#boxSh)">
    <rect x="148" y="28" width="104" height="32" rx="7" fill="#fbbf24" stroke="#d97706" stroke-width="2"
      transform="rotate(-28 252 60)"/>
    <!-- Bow on lid -->
    <ellipse cx="185" cy="23" rx="18" ry="8" fill="#fef08a" opacity="0.85" transform="rotate(-20 185 23)"/>
    <ellipse cx="185" cy="23" rx="18" ry="8" fill="#fef08a" opacity="0.85" transform="rotate(20 185 23)"/>
    <circle cx="185" cy="23" r="6" fill="#fbbf24"/>
  </g>
  <!-- Sparkle rays -->
  <line x1="200" y1="35" x2="200" y2="18" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
  <line x1="218" y1="40" x2="232" y2="26" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
  <line x1="182" y1="40" x2="168" y2="26" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
  <line x1="224" y1="50" x2="240" y2="42" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
  <line x1="176" y1="50" x2="160" y2="42" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>

  <!-- ─── CLOSED BOXES — 5 remaining ─── -->
  <!-- Box drawing macro (approximate as code):
       Body: rect at (X, Y+22, 88, 62, rx=6)
       Lid:  rect at (X-3, Y, 94, 26, rx=6)
       Ribbon H: rect at (X, Y+52, 88, 8)
       Ribbon V: rect at (X+35, Y+22, 18, 62)
       Ribbon on lid: rect at (X+35, Y, 18, 26)
       Bow: ellipses at lid center -->

  <!-- BOX 1 — Row1 Col1 (x=35, y=130) — PURPLE -->
  <g filter="url(#boxSh)">
    <rect x="35"  y="152" width="88" height="62" rx="6" fill="#1e0d38" stroke="#7c3aed" stroke-width="1.8"/>
    <rect x="32"  y="130" width="94" height="26" rx="6" fill="#2d1050" stroke="#8b5cf6" stroke-width="1.8"/>
    <rect x="35"  y="168" width="88" height="8"  fill="#7c3aed" opacity="0.75"/>
    <rect x="70"  y="152" width="18" height="62" fill="#7c3aed" opacity="0.75"/>
    <rect x="70"  y="130" width="18" height="26" fill="#7c3aed" opacity="0.75"/>
    <ellipse cx="79" cy="143" rx="16" ry="7" fill="#a855f7" opacity="0.9" transform="rotate(-22 79 143)"/>
    <ellipse cx="79" cy="143" rx="16" ry="7" fill="#a855f7" opacity="0.9" transform="rotate(22 79 143)"/>
    <circle cx="79" cy="143" r="5" fill="#8b5cf6"/>
    <text x="79" y="190" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="700" font-family="sans-serif">?</text>
  </g>

  <!-- BOX 2 — Row1 Col3 (x=277, y=130) — BLUE -->
  <g filter="url(#boxSh)">
    <rect x="277" y="152" width="88" height="62" rx="6" fill="#0c1e40" stroke="#3b82f6" stroke-width="1.8"/>
    <rect x="274" y="130" width="94" height="26" rx="6" fill="#0e2655" stroke="#60a5fa" stroke-width="1.8"/>
    <rect x="277" y="168" width="88" height="8"  fill="#3b82f6" opacity="0.75"/>
    <rect x="312" y="152" width="18" height="62" fill="#3b82f6" opacity="0.75"/>
    <rect x="312" y="130" width="18" height="26" fill="#3b82f6" opacity="0.75"/>
    <ellipse cx="321" cy="143" rx="16" ry="7" fill="#60a5fa" opacity="0.9" transform="rotate(-22 321 143)"/>
    <ellipse cx="321" cy="143" rx="16" ry="7" fill="#60a5fa" opacity="0.9" transform="rotate(22 321 143)"/>
    <circle cx="321" cy="143" r="5" fill="#3b82f6"/>
    <text x="321" y="190" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="700" font-family="sans-serif">?</text>
  </g>

  <!-- BOX 3 — Row2 Col1 (x=35, y=228) — RED -->
  <g filter="url(#boxSh)">
    <rect x="35"  y="250" width="88" height="38" rx="6" fill="#2a0808" stroke="#ef4444" stroke-width="1.8"/>
    <rect x="32"  y="228" width="94" height="26" rx="6" fill="#3a0a0a" stroke="#f87171" stroke-width="1.8"/>
    <rect x="35"  y="260" width="88" height="8"  fill="#ef4444" opacity="0.75"/>
    <rect x="70"  y="228" width="18" height="60" fill="#ef4444" opacity="0.75"/>
    <ellipse cx="79" cy="241" rx="16" ry="7" fill="#f87171" opacity="0.9" transform="rotate(-22 79 241)"/>
    <ellipse cx="79" cy="241" rx="16" ry="7" fill="#f87171" opacity="0.9" transform="rotate(22 79 241)"/>
    <circle cx="79" cy="241" r="5" fill="#ef4444"/>
  </g>

  <!-- BOX 4 — Row2 Col2 (x=156, y=228) — GREEN -->
  <g filter="url(#boxSh)">
    <rect x="156" y="250" width="88" height="38" rx="6" fill="#082215" stroke="#22c55e" stroke-width="1.8"/>
    <rect x="153" y="228" width="94" height="26" rx="6" fill="#0a2e1a" stroke="#4ade80" stroke-width="1.8"/>
    <rect x="156" y="260" width="88" height="8"  fill="#22c55e" opacity="0.75"/>
    <rect x="191" y="228" width="18" height="60" fill="#22c55e" opacity="0.75"/>
    <ellipse cx="200" cy="241" rx="16" ry="7" fill="#4ade80" opacity="0.9" transform="rotate(-22 200 241)"/>
    <ellipse cx="200" cy="241" rx="16" ry="7" fill="#4ade80" opacity="0.9" transform="rotate(22 200 241)"/>
    <circle cx="200" cy="241" r="5" fill="#22c55e"/>
  </g>

  <!-- BOX 5 — Row2 Col3 (x=277, y=228) — PINK -->
  <g filter="url(#boxSh)">
    <rect x="277" y="250" width="88" height="38" rx="6" fill="#2a0820" stroke="#ec4899" stroke-width="1.8"/>
    <rect x="274" y="228" width="94" height="26" rx="6" fill="#380a2a" stroke="#f472b6" stroke-width="1.8"/>
    <rect x="277" y="260" width="88" height="8"  fill="#ec4899" opacity="0.75"/>
    <rect x="312" y="228" width="18" height="60" fill="#ec4899" opacity="0.75"/>
    <ellipse cx="321" cy="241" rx="16" ry="7" fill="#f472b6" opacity="0.9" transform="rotate(-22 321 241)"/>
    <ellipse cx="321" cy="241" rx="16" ry="7" fill="#f472b6" opacity="0.9" transform="rotate(22 321 241)"/>
    <circle cx="321" cy="241" r="5" fill="#ec4899"/>
  </g>

  <text x="200" y="295" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="900" font-family="sans-serif" letter-spacing="3">JACKPOT BOX</text>
</svg>
