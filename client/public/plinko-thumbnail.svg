<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1a1f"/>
      <stop offset="100%" stop-color="#050b0e"/>
    </radialGradient>
    <radialGradient id="ball1" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#80ffcc"/>
      <stop offset="100%" stop-color="#00aa55"/>
    </radialGradient>
    <radialGradient id="ball2" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffee80"/>
      <stop offset="100%" stop-color="#cc8800"/>
    </radialGradient>
    <radialGradient id="ball3" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff80cc"/>
      <stop offset="100%" stop-color="#cc0066"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Title -->
  <text x="200" y="44" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" letter-spacing="5" fill="#00ff88" filter="url(#glow)">PLINKO</text>
  <text x="200" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#00ff8880" letter-spacing="2">DROP THE BALL • WIN BIG</text>

  <!-- Pegs - row 1 -->
  <circle cx="200" cy="82" r="5" fill="#ffffff" filter="url(#glow)"/>

  <!-- Pegs - row 2 -->
  <circle cx="175" cy="108" r="5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="225" cy="108" r="5" fill="#ffffff" filter="url(#glow)"/>

  <!-- Pegs - row 3 -->
  <circle cx="150" cy="134" r="5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="200" cy="134" r="5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="250" cy="134" r="5" fill="#ffffff" filter="url(#glow)"/>

  <!-- Pegs - row 4 -->
  <circle cx="125" cy="160" r="5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="175" cy="160" r="5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="225" cy="160" r="5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="275" cy="160" r="5" fill="#ffffff" filter="url(#glow)"/>

  <!-- Pegs - row 5 -->
  <circle cx="100" cy="186" r="5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="150" cy="186" r="5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="200" cy="186" r="5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="250" cy="186" r="5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="300" cy="186" r="5" fill="#ffffff" filter="url(#glow)"/>

  <!-- Balls falling -->
  <circle cx="188" cy="96" r="8" fill="url(#ball1)" filter="url(#glow)"/>
  <circle cx="163" cy="148" r="8" fill="url(#ball2)" filter="url(#glow)"/>
  <circle cx="238" cy="122" r="8" fill="url(#ball3)" filter="url(#glow)"/>

  <!-- Ball trails -->
  <line x1="192" y1="82" x2="188" y2="96" stroke="#00ff8840" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="175" y1="134" x2="163" y2="148" stroke="#ffcc0040" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- Buckets at bottom -->
  <rect x="30" y="210" width="52" height="40" rx="4" fill="#ff333340" stroke="#ff3333" stroke-width="1.5"/>
  <text x="56" y="235" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#ff4444">0.2x</text>

  <rect x="88" y="210" width="52" height="40" rx="4" fill="#ff880040" stroke="#ff8800" stroke-width="1.5"/>
  <text x="114" y="235" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#ffaa00">1x</text>

  <rect x="146" y="210" width="52" height="40" rx="4" fill="#0066ff40" stroke="#0088ff" stroke-width="1.5"/>
  <text x="172" y="235" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#44aaff">3x</text>

  <rect x="204" y="205" width="52" height="45" rx="4" fill="#00ff8840" stroke="#00ff88" stroke-width="2.5" filter="url(#glow)"/>
  <text x="230" y="234" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#00ff88" filter="url(#glow)">5x</text>

  <rect x="262" y="210" width="52" height="40" rx="4" fill="#0066ff40" stroke="#0088ff" stroke-width="1.5"/>
  <text x="288" y="235" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#44aaff">3x</text>

  <rect x="318" y="210" width="52" height="40" rx="4" fill="#ff333340" stroke="#ff3333" stroke-width="1.5"/>
  <text x="344" y="235" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#ff4444">0.2x</text>

  <!-- Bottom label -->
  <text x="200" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#00ff8870" letter-spacing="1">97% RTP</text>
</svg>
