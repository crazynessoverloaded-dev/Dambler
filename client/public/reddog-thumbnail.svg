<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs>
  <radialGradient id="rd-bg" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#0f0a18"/><stop offset="100%" stop-color="#050308"/>
  </radialGradient>
  <radialGradient id="rd-glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00ff88" stop-opacity="0.15"/><stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="rd-card" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#f0fdf4"/>
  </linearGradient>
  <linearGradient id="rd-middle-card" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#fffbeb"/>
  </linearGradient>
  <filter id="rd-shadow"><feDropShadow dx="3" dy="5" stdDeviation="8" flood-color="#000" flood-opacity="0.8"/></filter>
  <filter id="rd-glow-f"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="rd-glow-big"><feGaussianBlur stdDeviation="14" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="400" height="300" fill="url(#rd-bg)"/>
<ellipse cx="200" cy="150" rx="180" ry="120" fill="url(#rd-glow)"/>
<!-- LEFT card: 2 of clubs -->
<g filter="url(#rd-shadow)">
  <rect x="22" y="72" width="98" height="142" rx="11" fill="url(#rd-card)" stroke="#d1d5db" stroke-width="1"/>
  <text x="36" y="102" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#111">2</text>
  <text x="36" y="122" font-family="Arial,sans-serif" font-size="16" fill="#111">♣</text>
  <text x="71" y="182" text-anchor="middle" font-family="Arial,sans-serif" font-size="68" fill="#111">♣</text>
  <text x="106" y="208" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#111" transform="rotate(180,106,198)">2</text>
</g>
<!-- Spread bracket: left arm -->
<line x1="122" y1="103" x2="150" y2="103" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round"/>
<line x1="122" y1="103" x2="122" y2="210" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round"/>
<line x1="122" y1="210" x2="150" y2="210" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round"/>
<!-- Spread bracket: right arm -->
<line x1="278" y1="103" x2="250" y2="103" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round"/>
<line x1="278" y1="103" x2="278" y2="210" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round"/>
<line x1="278" y1="210" x2="250" y2="210" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round"/>
<!-- CENTER card: 6 of diamonds (winning card between 2 and 8) -->
<g filter="url(#rd-shadow)">
  <rect x="154" y="62" width="98" height="142" rx="11" fill="url(#rd-middle-card)" stroke="#fbbf24" stroke-width="3" filter="url(#rd-glow-f)"/>
  <text x="168" y="92" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#dc2626">6</text>
  <text x="168" y="112" font-family="Arial,sans-serif" font-size="16" fill="#dc2626">♦</text>
  <text x="203" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="68" fill="#dc2626">♦</text>
  <text x="238" y="198" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#dc2626" transform="rotate(180,238,188)">6</text>
</g>
<!-- Down arrow showing card dropped in -->
<text x="203" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" fill="#fbbf24" filter="url(#rd-glow-f)">↓</text>
<!-- RIGHT card: 8 of hearts -->
<g filter="url(#rd-shadow)">
  <rect x="280" y="72" width="98" height="142" rx="11" fill="url(#rd-card)" stroke="#d1d5db" stroke-width="1"/>
  <text x="294" y="102" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#dc2626">8</text>
  <text x="294" y="122" font-family="Arial,sans-serif" font-size="16" fill="#dc2626">♥</text>
  <text x="329" y="182" text-anchor="middle" font-family="Arial,sans-serif" font-size="68" fill="#dc2626">♥</text>
  <text x="364" y="208" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#dc2626" transform="rotate(180,364,198)">8</text>
</g>
<!-- WIN badge -->
<rect x="100" y="232" width="200" height="44" rx="14" fill="#001a08" stroke="#00ff88" stroke-width="2.5" filter="url(#rd-glow-f)"/>
<text x="200" y="250" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="11" fill="#00ff88" letter-spacing="2">SPREAD 5 = WINS</text>
<text x="200" y="269" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="18" font-weight="900" fill="#00ff88" filter="url(#rd-glow-big)">BETWEEN!</text>
<!-- Title -->
<text x="200" y="294" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="10" letter-spacing="4" fill="#00ff8860">RED DOG</text>
</svg>