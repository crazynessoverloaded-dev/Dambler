<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs>
  <radialGradient id="ch-bg" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#091a0e"/><stop offset="100%" stop-color="#030806"/>
  </radialGradient>
  <radialGradient id="ch-glow" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#00ff88" stop-opacity="0.14"/><stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="ch-card" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#f0fdf4"/>
  </linearGradient>
  <linearGradient id="ch-back" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#0d1f36"/>
  </linearGradient>
  <filter id="ch-shadow"><feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.8"/></filter>
  <filter id="ch-glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="ch-big"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="400" height="300" fill="url(#ch-bg)"/>
<ellipse cx="200" cy="150" rx="195" ry="130" fill="url(#ch-glow)"/>
<!-- Table lines (poker table feel) -->
<ellipse cx="200" cy="160" rx="185" ry="115" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.12"/>
<ellipse cx="200" cy="160" rx="175" ry="105" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.08"/>
<!-- DEALER label -->
<text x="200" y="30" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="10" letter-spacing="3" fill="#00ff8870">DEALER</text>
<!-- Dealer hole cards: 2 face-down -->
<g transform="rotate(-5,145,58)" filter="url(#ch-shadow)">
  <rect x="118" y="36" width="56" height="80" rx="8" fill="url(#ch-back)" stroke="#2563eb" stroke-width="1"/>
  <rect x="124" y="42" width="44" height="68" rx="5" fill="none" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="146" y="80" text-anchor="middle" font-family="serif" font-size="24" fill="#3b82f640">?</text>
</g>
<g transform="rotate(5,235,58)" filter="url(#ch-shadow)">
  <rect x="226" y="36" width="56" height="80" rx="8" fill="url(#ch-back)" stroke="#2563eb" stroke-width="1"/>
  <rect x="232" y="42" width="44" height="68" rx="5" fill="none" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="254" y="80" text-anchor="middle" font-family="serif" font-size="24" fill="#3b82f640">?</text>
</g>
<!-- Community cards (flop 3 + turn + river all hearts - royal flush!) -->
<text x="200" y="132" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="9" letter-spacing="3" fill="#00ff8870">COMMUNITY CARDS</text>
<g filter="url(#ch-shadow)">
  <rect x="58" y="140" width="58" height="84" rx="8" fill="url(#ch-card)" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="68" y="162" font-family="Arial Black,sans-serif" font-size="14" font-weight="900" fill="#dc2626">10</text>
  <text x="87" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="42" fill="#dc2626">♥</text>
</g>
<g filter="url(#ch-shadow)">
  <rect x="124" y="140" width="58" height="84" rx="8" fill="url(#ch-card)" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="136" y="162" font-family="Arial Black,sans-serif" font-size="14" font-weight="900" fill="#dc2626">J</text>
  <text x="153" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="42" fill="#dc2626">♥</text>
</g>
<g filter="url(#ch-shadow)">
  <rect x="190" y="140" width="58" height="84" rx="8" fill="url(#ch-card)" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="202" y="162" font-family="Arial Black,sans-serif" font-size="14" font-weight="900" fill="#dc2626">Q</text>
  <text x="219" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="42" fill="#dc2626">♥</text>
</g>
<g filter="url(#ch-shadow)">
  <rect x="256" y="140" width="58" height="84" rx="8" fill="url(#ch-card)" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="266" y="162" font-family="Arial Black,sans-serif" font-size="14" font-weight="900" fill="#dc2626">K</text>
  <text x="285" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="42" fill="#dc2626">♥</text>
</g>
<g filter="url(#ch-shadow)">
  <rect x="322" y="140" width="58" height="84" rx="8" fill="url(#ch-card)" stroke="#fca5a5" stroke-width="2.5" filter="url(#ch-glow)"/>
  <text x="334" y="162" font-family="Arial Black,sans-serif" font-size="14" font-weight="900" fill="#dc2626">A</text>
  <text x="351" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="42" fill="#dc2626">♥</text>
</g>
<!-- Player hole cards -->
<text x="200" y="244" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="9" letter-spacing="3" fill="#00ff8870">YOUR HAND</text>
<g filter="url(#ch-shadow)">
  <rect x="148" y="250" width="50" height="40" rx="6" fill="url(#ch-card)" stroke="#d1d5db" stroke-width="1"/>
  <text x="160" y="268" font-family="Arial Black,sans-serif" font-size="13" font-weight="900" fill="#dc2626">K</text>
  <text x="186" y="283" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#dc2626">♦</text>
</g>
<g filter="url(#ch-shadow)">
  <rect x="206" y="250" width="50" height="40" rx="6" fill="url(#ch-card)" stroke="#d1d5db" stroke-width="1"/>
  <text x="218" y="268" font-family="Arial Black,sans-serif" font-size="13" font-weight="900" fill="#111">A</text>
  <text x="244" y="283" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#111">♠</text>
</g>
<!-- ROYAL FLUSH banner -->
<rect x="40" y="30" width="92" height="36" rx="10" fill="#1a0005" stroke="#dc2626" stroke-width="1.5" filter="url(#ch-glow)"/>
<text x="86" y="44" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="8" fill="#dc2626">ROYAL FLUSH</text>
<text x="86" y="59" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="13" fill="#dc2626" filter="url(#ch-big)">20 : 1</text>
<!-- Title -->
<text x="320" y="42" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="9" letter-spacing="2" fill="#00ff88" filter="url(#ch-glow)">CASINO</text>
<text x="320" y="56" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="9" letter-spacing="2" fill="#00ff88" filter="url(#ch-glow)">HOLDEM</text>
</svg>