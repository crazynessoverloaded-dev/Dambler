<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs>
  <radialGradient id="ab-bg" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#1a0a00"/><stop offset="100%" stop-color="#080400"/>
  </radialGradient>
  <radialGradient id="ab-left" cx="20%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f97316" stop-opacity="0.22"/><stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="ab-right" cx="80%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#16a34a" stop-opacity="0.22"/><stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="ab-center" cx="50%" cy="50%" r="30%">
    <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.25"/><stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="ab-card" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#fffbeb"/>
  </linearGradient>
  <linearGradient id="ab-joker" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#fffbeb"/><stop offset="100%" stop-color="#fef3c7"/>
  </linearGradient>
  <filter id="ab-shadow"><feDropShadow dx="3" dy="5" stdDeviation="8" flood-color="#000" flood-opacity="0.8"/></filter>
  <filter id="ab-glow-gold"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="ab-glow-o"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="ab-glow-g"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="400" height="300" fill="url(#ab-bg)"/>
<rect width="400" height="300" fill="url(#ab-left)"/>
<rect width="400" height="300" fill="url(#ab-right)"/>
<rect width="400" height="300" fill="url(#ab-center)"/>
<!-- Decorative diamond pattern background -->
<polygon points="200,12 218,30 200,48 182,30" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
<polygon points="200,12 230,42 200,72 170,42" fill="none" stroke="#fbbf24" stroke-width="0.8" opacity="0.2"/>
<polygon points="200,228 218,246 200,264 182,246" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
<polygon points="200,228 230,258 200,288 170,258" fill="none" stroke="#fbbf24" stroke-width="0.8" opacity="0.2"/>
<!-- Left decorative dots (ANDAR side) -->
<circle cx="28" cy="80" r="3" fill="#f97316" opacity="0.5"/>
<circle cx="42" cy="68" r="2" fill="#f97316" opacity="0.4"/>
<circle cx="20" cy="95" r="2" fill="#f97316" opacity="0.3"/>
<!-- Right decorative dots (BAHAR side) -->
<circle cx="372" cy="80" r="3" fill="#16a34a" opacity="0.5"/>
<circle cx="358" cy="68" r="2" fill="#16a34a" opacity="0.4"/>
<circle cx="380" cy="95" r="2" fill="#16a34a" opacity="0.3"/>
<!-- ANDAR label with saffron color -->
<rect x="12" y="38" width="120" height="30" rx="10" fill="#7c2d00" stroke="#f97316" stroke-width="1.5" filter="url(#ab-glow-o)"/>
<text x="72" y="59" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="16" font-weight="900" letter-spacing="3" fill="#f97316">ANDAR</text>
<!-- BAHAR label with green color -->
<rect x="268" y="38" width="120" height="30" rx="10" fill="#052e16" stroke="#16a34a" stroke-width="1.5" filter="url(#ab-glow-g)"/>
<text x="328" y="59" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="16" font-weight="900" letter-spacing="3" fill="#16a34a">BAHAR</text>
<!-- Andar side: 3 cards stacked, last matching -->
<g transform="rotate(-5,68,158)" filter="url(#ab-shadow)">
  <rect x="26" y="120" width="60" height="88" rx="8" fill="url(#ab-card)" stroke="#fde68a" stroke-width="1" opacity="0.7"/>
  <text x="40" y="145" font-family="Arial Black,sans-serif" font-size="14" fill="#dc2626">3</text>
  <text x="56" y="182" text-anchor="middle" font-family="Arial,sans-serif" font-size="36" fill="#dc2626">♦</text>
</g>
<g transform="rotate(3,84,155)" filter="url(#ab-shadow)">
  <rect x="54" y="118" width="60" height="88" rx="8" fill="url(#ab-card)" stroke="#fde68a" stroke-width="1" opacity="0.85"/>
  <text x="68" y="143" font-family="Arial Black,sans-serif" font-size="14" fill="#111">7</text>
  <text x="84" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="36" fill="#111">♣</text>
</g>
<!-- Winning andar card (matches joker suit Q) -->
<g filter="url(#ab-shadow)">
  <rect x="80" y="114" width="64" height="92" rx="9" fill="url(#ab-card)" stroke="#f97316" stroke-width="2.5" filter="url(#ab-glow-o)"/>
  <text x="93" y="140" font-family="Arial Black,sans-serif" font-size="15" font-weight="900" fill="#dc2626">Q</text>
  <text x="112" y="182" text-anchor="middle" font-family="Arial,sans-serif" font-size="40" fill="#dc2626">♥</text>
</g>
<!-- Center JOKER card (large, golden border) -->
<g filter="url(#ab-shadow)">
  <rect x="158" y="80" width="84" height="122" rx="12" fill="url(#ab-joker)" stroke="#fbbf24" stroke-width="3" filter="url(#ab-glow-gold)"/>
  <text x="172" y="106" font-family="Arial Black,sans-serif" font-size="18" font-weight="900" fill="#dc2626">Q</text>
  <text x="172" y="126" font-family="Arial,sans-serif" font-size="14" fill="#dc2626">♥</text>
  <text x="200" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="58" fill="#dc2626">♥</text>
  <text x="228" y="196" font-family="Arial Black,sans-serif" font-size="18" font-weight="900" fill="#dc2626" transform="rotate(180,228,187)">Q</text>
</g>
<text x="200" y="76" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="9" letter-spacing="3" fill="#fbbf24" filter="url(#ab-glow-gold)">JOKER</text>
<!-- Bahar side: 3 cards, last doesn't match -->
<g transform="rotate(-3,300,155)" filter="url(#ab-shadow)">
  <rect x="268" y="118" width="60" height="88" rx="8" fill="url(#ab-card)" stroke="#fde68a" stroke-width="1" opacity="0.7"/>
  <text x="282" y="143" font-family="Arial Black,sans-serif" font-size="14" fill="#111">5</text>
  <text x="298" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="36" fill="#111">♠</text>
</g>
<g transform="rotate(5,322,157)" filter="url(#ab-shadow)">
  <rect x="296" y="120" width="60" height="88" rx="8" fill="url(#ab-card)" stroke="#fde68a" stroke-width="1" opacity="0.85"/>
  <text x="310" y="145" font-family="Arial Black,sans-serif" font-size="14" fill="#111">2</text>
  <text x="326" y="182" text-anchor="middle" font-family="Arial,sans-serif" font-size="36" fill="#111">♣</text>
</g>
<g transform="rotate(5,344,157)" filter="url(#ab-shadow)">
  <rect x="318" y="120" width="60" height="88" rx="8" fill="url(#ab-card)" stroke="#fde68a" stroke-width="1" opacity="0.6"/>
  <text x="332" y="145" font-family="Arial Black,sans-serif" font-size="14" fill="#dc2626">8</text>
  <text x="348" y="182" text-anchor="middle" font-family="Arial,sans-serif" font-size="36" fill="#dc2626">♦</text>
</g>
<!-- ANDAR WINS banner -->
<rect x="68" y="226" width="264" height="44" rx="14" fill="#1c0a00" stroke="#f97316" stroke-width="2" filter="url(#ab-glow-o)"/>
<text x="200" y="244" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="11" letter-spacing="2" fill="#f97316">ANDAR WINS!</text>
<text x="200" y="263" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="17" font-weight="900" fill="#f97316">0.9 : 1</text>
<!-- Title -->
<text x="200" y="292" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="9" letter-spacing="3" fill="#fbbf2460">ANDAR BAHAR</text>
</svg>