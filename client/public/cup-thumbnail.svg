<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f1a10"/>
      <stop offset="100%" stop-color="#060e06"/>
    </radialGradient>
    <linearGradient id="cup-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cc2200"/>
      <stop offset="100%" stop-color="#881100"/>
    </linearGradient>
    <linearGradient id="cup-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0044cc"/>
      <stop offset="100%" stop-color="#002288"/>
    </linearGradient>
    <linearGradient id="cup-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00aa44"/>
      <stop offset="100%" stop-color="#005522"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-ball">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Table surface -->
  <rect x="0" y="220" width="400" height="80" rx="0" fill="#0a140a" stroke="#00ff8820" stroke-width="1"/>
  <line x1="0" y1="220" x2="400" y2="220" stroke="#00ff8840" stroke-width="1.5"/>

  <!-- === CUP LEFT (red) === -->
  <!-- Body -->
  <path d="M75 210 L55 135 Q55 120 70 120 L130 120 Q145 120 145 135 L125 210 Z" fill="url(#cup-red)" stroke="#ff443360" stroke-width="2"/>
  <!-- Rim highlight -->
  <ellipse cx="100" cy="120" rx="30" ry="8" fill="#ff6644" opacity="0.7"/>
  <!-- Shine -->
  <path d="M70 145 Q75 135 85 138" stroke="#ff8866" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Base -->
  <rect x="80" y="208" width="40" height="12" rx="4" fill="#661100"/>

  <!-- === CUP CENTER (blue) - lifted, showing ball === -->
  <path d="M195 150 L175 75 Q175 60 190 60 L230 60 Q245 60 245 75 L225 150 Z" fill="url(#cup-blue)" stroke="#4466ff60" stroke-width="2"/>
  <!-- Rim highlight -->
  <ellipse cx="210" cy="60" rx="20" ry="6" fill="#6688ff" opacity="0.7"/>
  <!-- Shine -->
  <path d="M185 95 Q189 82 197 86" stroke="#8899ff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Base -->
  <rect x="195" y="148" width="30" height="12" rx="4" fill="#001188"/>
  <!-- Motion lines (cup being lifted) -->
  <line x1="210" y1="50" x2="210" y2="20" stroke="#4466ff50" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="195" y1="48" x2="190" y2="18" stroke="#4466ff30" stroke-width="1.5" stroke-dasharray="3,4"/>
  <line x1="225" y1="48" x2="230" y2="18" stroke="#4466ff30" stroke-width="1.5" stroke-dasharray="3,4"/>

  <!-- BALL revealed under center cup -->
  <circle cx="210" cy="175" r="20" fill="#ffdd00" filter="url(#glow-ball)"/>
  <circle cx="210" cy="175" r="20" fill="none" stroke="#ffff8880" stroke-width="3"/>
  <circle cx="204" cy="169" r="5" fill="#ffffff50"/>

  <!-- === CUP RIGHT (green) === -->
  <path d="M295 210 L275 135 Q275 120 290 120 L350 120 Q365 120 365 135 L345 210 Z" fill="url(#cup-green)" stroke="#00ff6660" stroke-width="2"/>
  <!-- Rim highlight -->
  <ellipse cx="320" cy="120" rx="30" ry="8" fill="#22cc66" opacity="0.7"/>
  <!-- Shine -->
  <path d="M290 145 Q295 135 305 138" stroke="#44ee88" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Base -->
  <rect x="300" y="208" width="40" height="12" rx="4" fill="#003311"/>

  <!-- Question marks above side cups -->
  <text x="100" y="108" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#ffffff40">?</text>
  <text x="320" y="108" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#ffffff40">?</text>

  <!-- Title -->
  <text x="200" y="42" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" letter-spacing="3" fill="#00ff88" filter="url(#glow)">GUESS THE CUP</text>
  <text x="200" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#00ff8880" letter-spacing="2">FIND THE BALL</text>

  <!-- Glow under ball -->
  <ellipse cx="210" cy="220" rx="30" ry="6" fill="#ffdd0030"/>

  <!-- Bottom RTP -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#00ff8870" letter-spacing="1">96% RTP</text>
</svg>
