<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs>
  <radialGradient id="cw-bg" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#1a0505"/><stop offset="100%" stop-color="#080202"/>
  </radialGradient>
  <radialGradient id="cw-left" cx="25%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#dc2626" stop-opacity="0.2"/><stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="cw-right" cx="75%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#2563eb" stop-opacity="0.15"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="cw-card-w" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#f8f0f0"/>
  </linearGradient>
  <linearGradient id="cw-card-b" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#f0f4ff"/>
  </linearGradient>
  <linearGradient id="cw-bolt" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/>
  </linearGradient>
  <filter id="cw-shadow"><feDropShadow dx="4" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.85"/></filter>
  <filter id="cw-glow-r"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="cw-glow-b"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="cw-war"><feGaussianBlur stdDeviation="14" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="400" height="300" fill="url(#cw-bg)"/>
<rect width="400" height="300" fill="url(#cw-left)"/>
<rect width="400" height="300" fill="url(#cw-right)"/>
<!-- Split line -->
<line x1="200" y1="0" x2="200" y2="300" stroke="#fbbf24" stroke-width="2" opacity="0.4"/>
<!-- Player card left - ACE WINS, tilted out toward viewer -->
<g transform="rotate(-10,118,148)" filter="url(#cw-shadow)">
  <rect x="42" y="58" width="108" height="158" rx="13" fill="url(#cw-card-w)" stroke="#fca5a5" stroke-width="2"/>
  <text x="58" y="92" font-family="Arial Black,sans-serif" font-size="30" font-weight="900" fill="#dc2626">A</text>
  <text x="58" y="115" font-family="Arial,sans-serif" font-size="20" fill="#dc2626">♥</text>
  <text x="96" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="82" fill="#dc2626">♥</text>
  <text x="134" y="210" font-family="Arial Black,sans-serif" font-size="30" font-weight="900" fill="#dc2626" transform="rotate(180,134,200)">A</text>
</g>
<!-- Dealer card right - KING LOSES -->
<g transform="rotate(10,282,148)" filter="url(#cw-shadow)">
  <rect x="250" y="58" width="108" height="158" rx="13" fill="url(#cw-card-b)" stroke="#93c5fd" stroke-width="2" opacity="0.7"/>
  <text x="266" y="92" font-family="Arial Black,sans-serif" font-size="30" font-weight="900" fill="#1d4ed8" opacity="0.7">K</text>
  <text x="266" y="115" font-family="Arial,sans-serif" font-size="20" fill="#1d4ed8" opacity="0.7">♠</text>
  <text x="304" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="82" fill="#1d4ed8" opacity="0.7">♠</text>
  <text x="342" y="210" font-family="Arial Black,sans-serif" font-size="30" font-weight="900" fill="#1d4ed8" transform="rotate(180,342,200)" opacity="0.7">K</text>
</g>
<!-- Lightning bolt between cards -->
<polygon points="196,68 182,148 198,148 184,232 218,138 200,138 214,68" fill="url(#cw-bolt)" filter="url(#cw-glow-r)" opacity="0.9"/>
<!-- WAR text -->
<text x="200" y="262" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="40" font-weight="900" letter-spacing="8" fill="#dc2626" filter="url(#cw-war)">WAR!</text>
<!-- Winner label -->
<rect x="28" y="228" width="128" height="24" rx="8" fill="#dc2626" filter="url(#cw-glow-r)"/>
<text x="92" y="245" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="12" fill="white">PLAYER WINS!</text>
<!-- Labels -->
<text x="96" y="38" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="12" letter-spacing="2" fill="#dc2626" filter="url(#cw-glow-b)">YOUR CARD</text>
<text x="304" y="38" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="12" letter-spacing="2" fill="#60a5fa">DEALER</text>
<!-- Title -->
<text x="200" y="296" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="10" letter-spacing="4" fill="#fbbf2460">CASINO WAR</text>
</svg>