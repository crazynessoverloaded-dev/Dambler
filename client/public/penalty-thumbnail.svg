<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020a14"/>
      <stop offset="100%" stop-color="#071825"/>
    </linearGradient>
    <linearGradient id="pitch" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <radialGradient id="ball" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e5e7eb"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </radialGradient>
    <radialGradient id="stadGlow" cx="50%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#1a5c34" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dropSh">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#000" flood-opacity="0.75"/>
    </filter>
    <filter id="keeperSh">
      <feDropShadow dx="2" dy="4" stdDeviation="7" flood-color="#000" flood-opacity="0.8"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Sky -->
  <rect width="400" height="300" fill="url(#sky)"/>
  <ellipse cx="200" cy="160" rx="240" ry="155" fill="url(#stadGlow)"/>

  <!-- Floodlight — left -->
  <rect x="16" y="12" width="4" height="68" fill="#2d3748"/>
  <rect x="9" y="10" width="18" height="5" rx="2" fill="#374151"/>
  <ellipse cx="11" cy="11" rx="4" ry="3" fill="#fef9c3" filter="url(#glow)" opacity="0.9"/>
  <ellipse cx="25" cy="11" rx="4" ry="3" fill="#fef9c3" filter="url(#glow)" opacity="0.9"/>
  <polygon points="7,12 29,12 155,182 105,182" fill="#fffde7" fill-opacity="0.055"/>

  <!-- Floodlight — right -->
  <rect x="380" y="12" width="4" height="68" fill="#2d3748"/>
  <rect x="373" y="10" width="18" height="5" rx="2" fill="#374151"/>
  <ellipse cx="375" cy="11" rx="4" ry="3" fill="#fef9c3" filter="url(#glow)" opacity="0.9"/>
  <ellipse cx="389" cy="11" rx="4" ry="3" fill="#fef9c3" filter="url(#glow)" opacity="0.9"/>
  <polygon points="371,12 393,12 295,182 245,182" fill="#fffde7" fill-opacity="0.055"/>

  <!-- Crowd silhouettes — left -->
  <path d="M0,184 Q9,173 20,180 Q31,169 42,177 Q53,166 64,174 Q75,163 86,171 Q97,160 108,168 Q119,157 130,165 L130,184 Z" fill="#080f06" opacity="0.95"/>
  <!-- Crowd silhouettes — right -->
  <path d="M270,184 Q281,163 292,171 Q303,160 314,168 Q325,157 336,165 Q347,154 358,162 Q369,151 380,159 Q391,150 400,156 L400,184 Z" fill="#080f06" opacity="0.95"/>

  <!-- Pitch -->
  <rect x="0" y="184" width="400" height="116" fill="url(#pitch)"/>
  <!-- Grass stripes -->
  <rect x="0"   y="184" width="52" height="116" fill="#145c2c" opacity="0.55"/>
  <rect x="104" y="184" width="52" height="116" fill="#145c2c" opacity="0.55"/>
  <rect x="208" y="184" width="52" height="116" fill="#145c2c" opacity="0.55"/>
  <rect x="312" y="184" width="52" height="116" fill="#145c2c" opacity="0.55"/>
  <!-- Touchline -->
  <line x1="0" y1="184" x2="400" y2="184" stroke="#ffffff" stroke-width="1.5" opacity="0.55"/>
  <!-- Penalty box -->
  <rect x="82" y="184" width="236" height="58" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.28"/>
  <!-- 6-yard box -->
  <rect x="132" y="184" width="136" height="26" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.18"/>
  <!-- Penalty spot -->
  <circle cx="200" cy="238" r="3" fill="#ffffff" opacity="0.6"/>
  <!-- Arc -->
  <path d="M156,184 A 47 47 0 0 0 244,184" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.18"/>

  <!-- ═══ GOAL STRUCTURE ═══ -->
  <g filter="url(#dropSh)">
    <!-- Depth — top bar -->
    <polygon points="78,46 96,34 304,34 322,46" fill="#091006" stroke="#2d3748" stroke-width="1"/>
    <!-- Depth — left panel -->
    <polygon points="78,46 96,34 96,184 78,190" fill="#0b140a" stroke="#2d3748" stroke-width="0.8"/>
    <!-- Depth — right panel -->
    <polygon points="322,46 304,34 304,184 322,190" fill="#0b140a" stroke="#2d3748" stroke-width="0.8"/>

    <!-- Net — horizontal -->
    <line x1="96" y1="52"  x2="304" y2="52"  stroke="#c4c9d0" stroke-width="0.5" opacity="0.2"/>
    <line x1="96" y1="72"  x2="304" y2="72"  stroke="#c4c9d0" stroke-width="0.5" opacity="0.2"/>
    <line x1="96" y1="92"  x2="304" y2="92"  stroke="#c4c9d0" stroke-width="0.5" opacity="0.2"/>
    <line x1="96" y1="112" x2="304" y2="112" stroke="#c4c9d0" stroke-width="0.5" opacity="0.2"/>
    <line x1="96" y1="132" x2="304" y2="132" stroke="#c4c9d0" stroke-width="0.5" opacity="0.2"/>
    <line x1="96" y1="152" x2="304" y2="152" stroke="#c4c9d0" stroke-width="0.5" opacity="0.2"/>
    <line x1="96" y1="172" x2="304" y2="172" stroke="#c4c9d0" stroke-width="0.5" opacity="0.2"/>
    <!-- Net — vertical -->
    <line x1="130" y1="34" x2="130" y2="184" stroke="#c4c9d0" stroke-width="0.5" opacity="0.2"/>
    <line x1="164" y1="34" x2="164" y2="184" stroke="#c4c9d0" stroke-width="0.5" opacity="0.2"/>
    <line x1="200" y1="34" x2="200" y2="184" stroke="#c4c9d0" stroke-width="0.5" opacity="0.2"/>
    <line x1="236" y1="34" x2="236" y2="184" stroke="#c4c9d0" stroke-width="0.5" opacity="0.2"/>
    <line x1="272" y1="34" x2="272" y2="184" stroke="#c4c9d0" stroke-width="0.5" opacity="0.2"/>

    <!-- Frame — left post -->
    <rect x="76" y="42" width="10" height="146" rx="3" fill="#e5e7eb"/>
    <!-- Frame — right post -->
    <rect x="314" y="42" width="10" height="146" rx="3" fill="#e5e7eb"/>
    <!-- Frame — crossbar -->
    <rect x="76" y="40" width="248" height="10" rx="3" fill="#e5e7eb"/>
  </g>

  <!-- GOAL watermark inside net -->
  <text x="200" y="135" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="56" font-weight="900" fill="#22c55e" fill-opacity="0.07" letter-spacing="2">GOAL!</text>

  <!-- Target zone — top-left corner (dashed green) -->
  <rect x="84" y="48" width="60" height="50" rx="3" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-width="2" stroke-dasharray="5 3" opacity="0.75"/>

  <!-- Net bulge at impact point -->
  <line x1="114" y1="66" x2="96" y2="46" stroke="#c4c9d0" stroke-width="0.9" opacity="0.5"/>
  <line x1="114" y1="66" x2="96" y2="78" stroke="#c4c9d0" stroke-width="0.9" opacity="0.5"/>
  <line x1="114" y1="66" x2="130" y2="46" stroke="#c4c9d0" stroke-width="0.9" opacity="0.5"/>
  <!-- Impact glow rings -->
  <circle cx="114" cy="66" r="26" fill="#22c55e" fill-opacity="0.08"/>
  <circle cx="114" cy="66" r="17" fill="#22c55e" fill-opacity="0.16"/>

  <!-- Ball in top-left of net -->
  <g filter="url(#dropSh)">
    <circle cx="114" cy="66" r="16" fill="url(#ball)"/>
    <path d="M114 50 L121 59 L118 67 L110 67 L107 59 Z" fill="#1f2937" opacity="0.65"/>
    <path d="M121 59 L129 64 L127 72 L118 67 Z" fill="#1f2937" opacity="0.42"/>
    <path d="M107 59 L99 64 L101 72 L110 67 Z" fill="#1f2937" opacity="0.42"/>
  </g>
  <!-- Impact sparks -->
  <line x1="114" y1="50" x2="114" y2="42" stroke="#fbbf24" stroke-width="2" opacity="0.85"/>
  <line x1="130" y1="57" x2="136" y2="51" stroke="#fbbf24" stroke-width="2" opacity="0.75"/>
  <line x1="98"  y1="57" x2="92"  y2="51" stroke="#fbbf24" stroke-width="2" opacity="0.75"/>
  <line x1="130" y1="76" x2="136" y2="81" stroke="#fbbf24" stroke-width="1.5" opacity="0.55"/>

  <!-- Goalkeeper — red jersey, diving RIGHT (wrong way) -->
  <g filter="url(#keeperSh)">
    <!-- Body -->
    <ellipse cx="258" cy="146" rx="40" ry="14" fill="#dc2626" transform="rotate(22 258 146)"/>
    <!-- Head -->
    <circle cx="290" cy="133" r="13" fill="#dc2626"/>
    <!-- Cap brim -->
    <path d="M278 127 Q290 119 302 127" fill="#fbbf24" opacity="0.92"/>
    <!-- Right arm reaching up and right -->
    <line x1="276" y1="131" x2="308" y2="115" stroke="#fbbf24" stroke-width="10" stroke-linecap="round"/>
    <!-- Glove (right, outstretched) -->
    <ellipse cx="312" cy="112" rx="12" ry="9" fill="#fbbf24" transform="rotate(18 312 112)"/>
    <!-- Left arm trailing -->
    <line x1="240" y1="152" x2="225" y2="165" stroke="#dc2626" stroke-width="8" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="224" y1="147" x2="200" y2="160" stroke="#dc2626" stroke-width="10" stroke-linecap="round"/>
    <line x1="234" y1="156" x2="216" y2="175" stroke="#dc2626" stroke-width="10" stroke-linecap="round"/>
    <!-- Boots -->
    <ellipse cx="196" cy="162" rx="10" ry="5" fill="#111827" transform="rotate(-15 196 162)"/>
    <ellipse cx="212" cy="177" rx="10" ry="5" fill="#111827" transform="rotate(-8 212 177)"/>
  </g>

  <!-- Shot trajectory arc -->
  <path d="M200 241 Q172 158 118 70"
    stroke="#fbbf24" stroke-width="2.8" fill="none" stroke-dasharray="7 5"
    opacity="0.88" marker-end="url(#arr)"/>

  <!-- Score pill -->
  <rect x="168" y="260" width="64" height="22" rx="11" fill="#22c55e" fill-opacity="0.18" stroke="#22c55e" stroke-width="1.2" stroke-opacity="0.7"/>
  <text x="200" y="275" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="10" font-weight="900" fill="#22c55e" letter-spacing="2">SCORED!</text>

  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" letter-spacing="3" fill="#fbbf24" filter="url(#titleGlow)">PENALTY SHOOT</text>
  <text x="200" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" fill="#fbbf24" fill-opacity="0.55" letter-spacing="4">PICK YOUR SPOT TO SCORE</text>
</svg>
