<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#1a0800"/><stop offset="100%" stop-color="#0a0300"/></linearGradient>
    <radialGradient id="heat" cx="50%" cy="70%" r="65%"><stop offset="0%" stop-color="#ff4500" stop-opacity="0.35"/><stop offset="60%" stop-color="#ff6b00" stop-opacity="0.12"/><stop offset="100%" stop-color="#ff4500" stop-opacity="0"/></radialGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ff4500"/><stop offset="50%" stop-color="#ff8c00"/><stop offset="100%" stop-color="#ffcc00"/></linearGradient>
    <linearGradient id="dice1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3a1000"/><stop offset="100%" stop-color="#1a0600"/></linearGradient>
    <filter id="gf"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gfs"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="200" rx="200" ry="150" fill="url(#heat)"/>
  <!-- Flame shapes -->
  <ellipse cx="150" cy="240" rx="28" ry="55" fill="url(#flame)" fill-opacity="0.7"/>
  <ellipse cx="150" cy="210" rx="16" ry="30" fill="#ffcc00" fill-opacity="0.5"/>
  <ellipse cx="200" cy="250" rx="22" ry="45" fill="url(#flame)" fill-opacity="0.75"/>
  <ellipse cx="200" cy="228" rx="12" ry="24" fill="#ffcc00" fill-opacity="0.55"/>
  <ellipse cx="250" cy="244" rx="25" ry="50" fill="url(#flame)" fill-opacity="0.65"/>
  <ellipse cx="250" cy="215" rx="14" ry="27" fill="#ffcc00" fill-opacity="0.45"/>
  <ellipse cx="112" cy="252" rx="18" ry="35" fill="url(#flame)" fill-opacity="0.45"/>
  <ellipse cx="290" cy="255" rx="16" ry="32" fill="url(#flame)" fill-opacity="0.4"/>
  <!-- Large die -->
  <rect x="80" y="100" width="130" height="130" rx="16" fill="url(#dice1)" stroke="#ff6b00" stroke-width="2.5" stroke-opacity="0.9"/>
  <polygon points="80,100 116,70 246,70 210,100" fill="#2a0c00" stroke="#ff6b00" stroke-width="1.5" stroke-opacity="0.6"/>
  <polygon points="210,100 246,70 246,200 210,230" fill="#1a0600" stroke="#ff6b00" stroke-width="1" stroke-opacity="0.4"/>
  <!-- 6 pips (hot roll) -->
  <circle cx="108" cy="126" r="9" fill="#ff6b00" filter="url(#gf)"/>
  <circle cx="145" cy="126" r="9" fill="#ff6b00" filter="url(#gf)"/>
  <circle cx="108" cy="165" r="9" fill="#ff6b00" filter="url(#gf)"/>
  <circle cx="145" cy="165" r="9" fill="#ff6b00" filter="url(#gf)"/>
  <circle cx="108" cy="204" r="9" fill="#ff6b00" filter="url(#gf)"/>
  <circle cx="145" cy="204" r="9" fill="#ff6b00" filter="url(#gf)"/>
  <!-- Smaller die, tilted -->
  <g transform="rotate(18 300 140)">
    <rect x="258" y="100" width="82" height="82" rx="10" fill="url(#dice1)" stroke="#ff4500" stroke-width="2" stroke-opacity="0.8"/>
    <circle cx="276" cy="118" r="7" fill="#ff4500" filter="url(#gf)"/>
    <circle cx="316" cy="118" r="7" fill="#ff4500" filter="url(#gf)"/>
    <circle cx="276" cy="164" r="7" fill="#ff4500" filter="url(#gf)"/>
    <circle cx="316" cy="164" r="7" fill="#ff4500" filter="url(#gf)"/>
  </g>
  <!-- HEAT meter -->
  <rect x="294" y="158" width="80" height="14" rx="7" fill="#1a0800" stroke="#ff6b00" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="296" y="160" width="72" height="10" rx="6" fill="url(#flame)" fill-opacity="0.85"/>
  <text x="334" y="188" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="10" fill="#ff8c00" letter-spacing="1">HEAT: MAX</text>
  <text x="200" y="44" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="28" font-weight="900" letter-spacing="5" fill="#ff6b00" filter="url(#gfs)">HOT DICE</text>
  <text x="200" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#ff4500" fill-opacity="0.65" letter-spacing="3">PUSH YOUR LUCK</text>
</svg>